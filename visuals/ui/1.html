    <style>
      .preview {
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card_0001 {
        width: 320px;
        height: 260px;
        position: relative;
      }

      .card_0001 .back {
        width: 100%;
      }
      .card_0001 .inner {
        width: 180px;
        border-radius: 16px;
        border: 8px solid #fff;
        background-color: #f5f5f5;
        box-shadow: 0 0 1px #000;
        position: absolute;
        transition: all 0.5s;
      }
      .card_0001 .inner_1 {
        transform-origin: 100% 100%;
        height: 236px;
        bottom: 24px;
        right: 24px;
      }
      .card_0001 .inner_2 {
        transform-origin: 0% 100%;
        height: 196px;
        bottom: 24px;
        left: 24px;
      }
      .card_0001 .inner_3 {
        transform-origin: 100% 100%;
        height: 164px;
        bottom: 24px;
        left: 62px;
      }
      .card_0001 .front {
        width: 320px;
        height: 160px;
        border-radius: 16px;
        background-color: #666;
        transform-origin: 0 100%;
        position: absolute;
        bottom: 0;
        left: 0;
        transition: all 0.5s;
        z-index: 1;
      }
      .card_0001 .front .text {
        margin: 24px;
        height: 40px;
        text-shadow: 0 4px 4px #0005;
        line-height: 40px;
        font-size: 28px;
        font-family: JM;
        font-weight: bold;
        color: #fff;
      }
      .card_0001 .front .boxs {
        width: 87px;
        height: 24px;
        display: flex;
        gap: 8px;
        position: absolute;
        bottom: 24px;
        right: 24px;
      }
      .card_0001 .front .boxs .box {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background-color: #777;
      }

      .card_0001:hover .inner_1 {
        transform: rotateZ(8deg) translateY(-8px);
      }
      .card_0001:hover .inner_2 {
        transform: rotateZ(-8deg) translateY(-8px);
      }
      .card_0001:hover .inner_3 {
        transform: rotateZ(4deg) translateY(-4px);
      }
      .card_0001:hover :nth-child(5) {
        height: 130px;
      }
    </style>
  </head>
