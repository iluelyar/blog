<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="404 - 在寂世庭的深处迷路了" />
    <meta name="keywords" content="kui,kchart,kcard,ktool" />
    <meta name="author" content="K5938" />
    <title>404 - 在寂世庭的深处迷路了</title>
    <link rel="shortcut icon" href="/src/image/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/src/css/index.css" />

    <style>
      .error {
        width: 100%;
        height: calc(100vh - 16px);
        display: flex;
      }
      .error .inner {
        width: 340px;
        margin: auto;
        display: grid;
        grid-template-columns: 140px auto;
        gap: 8px;
      }
      .error .inner .error-code {
        grid-column: 1/3;
        font-size: 2.4em;
      }
      .error .inner .error-text {
        grid-column: 1/3;
        font-size: 1.2em;
      }
      .error .inner .error-btn {
        width: 140px;
        height: 40px;
        border: 1px solid #000;
        border-radius: 40px;
        line-height: 40px;
        text-align: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="blog">
      <div class="slide">
        <k-author></k-author>
        <k-nav></k-nav>
        <k-search
          data='[
            { "title": "Track A", "link": "1.html" },
            { "title": "Track B", "link": "2.html" }
          ]'
        ></k-search>
      </div>
      <div class="main">
        <div class="error">
          <div class="inner">
            <div class="error-code">404 - 迷失于寂世庭</div>
            <div class="error-text">
              此境幽邃，似有还无。君或行至虚实之界，所寻之地已化太虚，暂不可见矣。
            </div>
            <div class="error-btn" onclick="history.back()">溯洄寻踪</div>
            <div class="error-btn" onclick="location.href='/'">归墟之门</div>
          </div>
        </div>
      </div>
      <div class="panel"></div>
      <div class="control">
        <div class="slide-btn">
          <k-icon src="/src/icon" name="slider"></k-icon>
        </div>
        <div class="panel-btn">
          <k-icon src="/src/icon" name="bar"></k-icon>
        </div>
      </div>
    </div>
    <script type="module" src="/kui/kui.js"></script>
    <script src="/src/js/index.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        document.querySelector("k-author").data = {
          cover: "/src/image/bg.jpg",
          avatar: "/src/image/avatar.png",
          name: "K5938",
          desc: "要么孤独，要么庸俗",
        };

        document.querySelector("k-nav").data = {
          src: "/src/icon",
          columns: 3,
          borderColor: "#000",
          iconFill: "#000",
          iconSize: "20",
          items: [
            {
              href: "/index.html",
              name: "menu",
              borderColor: "#f03",
              iconFill: "#f30",
            },
            {
              href: "/m.html",
              name: "moment",
              borderColor: "#034f40",
              iconFill: "#20f420",
            },
            {
              href: "/n.html",
              name: "note",
              borderColor: "#ff400f",
              iconFill: "#0234ff",
            },
            {
              href: "/v.html",
              name: "visual",
              borderColor: "#0f56f0",
              iconFill: "#0f3fa0",
            },
            {
              href: "/d.html",
              name: "tool",
              borderColor: "#0234f0",
              iconFill: "#ff3410",
            },
            {
              href: "/p.html",
              name: "project",
              borderColor: "#0421f0",
              iconFill: "#43ff45",
            },
          ],
        };
      });
    </script>
  </body>
</html>
