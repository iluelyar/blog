  <head>
    <meta charset="UTF-8" />

    <meta name="keywords" content="html,css,js" />
    <meta name="author" content="K5938" />
    <!-- title -->
    <title>404 - 在寂世庭的深处迷路了</title>
    <!-- css -->
    <link rel="shortcut icon" href="/assets/img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="stylesheet" href="/assets/css/kleft.css" />
    <link rel="stylesheet" href="/assets/css/kcenter.css" />
    <link rel="stylesheet" href="/assets/css/kright.css" />
    <style>
      .kcenter {
        width: 100%;
        height: calc(100vh - 16px);
        display: flex;
        overflow: auto;
      }
      .kcenter .kcenter-error {
        width: 340px;
        margin: auto;
      }
      .kcenter .kcenter-error-404 {
        font-size: 2em;
        font-weight: bold;
      }
      .kcenter .kcenter-error-text {
        margin: 24px 0;
        font-size: 16px;
        font-weight: bold;
      }
      .kcenter .kcenter-error-btn {
        width: 140px;
        height: 40px;
        background-color: #000000;
        border-radius: 8px;
        border: none;
        outline: none;
        line-height: 40px;
        text-align: center;
        color: #ffffff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="kblog">
      <div class="kleft">
        <div class="kleft-container">
          <div class="author">
            <div class="author-avatar"></div>
            <div class="author-name">K5938</div>
            <div class="author-desc">要么庸俗，要么孤独</div>
          </div>
          <div class="nav">
            <a href="/index.html">
              <div class="nav-item">
                <img src="/assets/svg/menu.svg" alt="" />
              </div>
            </a>
            <a href="/moments/index.html">
              <div class="nav-item">
                <img src="/assets/svg/moment.svg" alt="" />
              </div>
            </a>
            <a href="/notes/index.html">
              <div class="nav-item">
                <img src="/assets/svg/note.svg" alt="" />
              </div>
            </a>
            <a href="/visuals/index.html">
              <div class="nav-item">
                <img src="/assets/svg/visual.svg" alt="" />
              </div>
            </a>
            <a href="/devtools/index.html">
              <div class="nav-item">
                <img src="/assets/svg/tool.svg" alt="" />
              </div>
            </a>
            <a href="/projects/index.html">
              <div class="nav-item">
                <img src="/assets/svg/project.svg" alt="" />
              </div>
            </a>
          </div>
          <div class="search">
            <div class="search-box">
              <div class="search-icon">
                <img src="/assets/svg/search.svg" alt="" />
              </div>
              <input
                class="search-input"
                type="text"
                placeholder="搜索"
                autocomplete="off"
              />
            </div>
            <ul class="search-result"></ul>
          </div>
        </div>
      </div>
      <div class="kcenter">
        <div class="kcenter-error">
          <div class="kcenter-error-404">404 - 在寂世庭的深处迷路了</div>
          <div class="kcenter-error-text">
            于此寂世庭，幽静深远，时有未可及之地。汝误入一隅，寻不得其踪，或此地已化虚无，杳然难觅。
          </div>
          <div class="kcenter-error-btn">归寻旧路</div>
        </div>
      </div>
      <div class="kright">
        <div class="kright-container"></div>
      </div>
      <div class="kcontrols">
        <div class="kcontrols-left">
          <img src="/assets/svg/slider.svg" alt="" />
        </div>
        <div class="kcontrols-right">
          <img src="/assets/svg/bar.svg" alt="" />
        </div>
      </div>
    </div>
    <script src="/assets/js/index.js"></script>
    <script src="/assets/js/kleft.js"></script>
    <script>
      $(".kcenter-error-btn").addEventListener("click", function () {
        var referrer = document.referrer;
        var currentHostname = window.location.hostname;

        if (referrer && new URL(referrer).hostname === currentHostname) {
          window.location.href = referrer;
        } else {
          window.location.href = "/index.html";
        }
      });
    </script>
  </body>
</html>
