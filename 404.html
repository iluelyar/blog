<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="404 - 在寂世庭的深处迷路了。" />
    <meta name="keywords" content="html,css,js" />
    <meta name="author" content="K5938" />
    <title>404 - 在寂世庭的深处迷路了</title>
    <link rel="shortcut icon" href="/assets/png/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/assets/css/index.css" />
    <script src="/assets/js/index.js"></script>
    <style>
      kmain {
        width: 100%;
        height: calc(100vh - 16px);
        display: flex;
      }
      kmain .error {
        width: 340px;
        margin: auto;
      }
      kmain .error-404 {
        font-size: 2em;
        font-weight: bold;
      }
      kmain .error-text {
        margin: 24px 0;
        font-size: 16px;
        font-weight: bold;
      }
      kmain .error-btn {
        width: 140px;
        height: 40px;
        background-color: #fff5;
        border-radius: 8px;
        border: none;
        outline: none;
        line-height: 40px;
        text-align: center;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="kblog">
      <kslide></kslide>

        <div class="error">
          <div class="error-404">404 - 在寂世庭的深处迷路了</div>
          <div class="error-text">
            于此寂世庭，幽静深远，时有未可及之地。汝误入一隅，寻不得其踪，或此地已化虚无，杳然难觅。
          </div>
          <div class="error-btn">归寻旧路</div>
        </div>

      <kpanel></kpanel>
      <kcontr></kcontr>
    </div>
    <script type="module">
      import { kui } from "/kui/kui.js";
      kui.kslide();
      kui.kmain();
      kui.kpanel();
      kui.kcontr();
    </script>
    <script>
      const btn = document.querySelector(".error-btn");
      btn.addEventListener("click", function () {
        window.location.href = "/index.html";
      });
    </script>
  </body>
</html>
