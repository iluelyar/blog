<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="404 - 在寂世庭的深处迷路了。" />
    <meta name="keywords" content="html,css,js" />
    <meta name="author" content="Kane" />
    <!-- title -->
    <title>404 - 在寂世庭的深处迷路了</title>
    <!-- css -->
    <link rel="shortcut icon" href="/assets/img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="stylesheet" href="/assets/css/kleft.css" />
    <link rel="stylesheet" href="/assets/css/kcenter.css" />
    <link rel="stylesheet" href="/assets/css/kright.css" />
    <style>
      .kcenter {
        width: 100%;
        height: calc(100vh - 16px);
        display: flex;
        overflow: auto;
      }
      .kcenter .kcenter-error {
        width: 340px;
        margin: auto;
      }
      .kcenter .kcenter-error-404 {
        font-size: 2em;
        font-weight: bold;
      }
      .kcenter .kcenter-error-text {
        margin: 24px 0;
        font-size: 16px;
        font-weight: bold;
      }
      .kcenter .kcenter-error-btn {
        width: 140px;
        height: 40px;
        background-color: #f5f5f5;
        border-radius: 8px;
        border: none;
        outline: none;
        text-align: center;
        color: #000;
        line-height: 40px;
        transition: all 0.5s ease;
      }
      .kcenter .kcenter-error-btn:hover {
        background-color: #fff5;
      }
    </style>
  </head>
  <body>
    <div class="kblog">
      <div class="kleft">
        <div class="kleft-container">
          <div class="author">
            <div class="author-avatar"></div>
            <div class="author-name">Kindergarten boss</div>
            <div class="author-desc">
              <div class="author-desc-on">要么庸俗，要么孤独</div>
              <div class="author-desc-off">寂世庭</div>
            </div>
          </div>
          <div class="nav">
            <a href="/notes/1.html">
              <div class="nav-item">
                <img src="/assets/icon/noteIcon.svg" alt="" />
              </div>
            </a>
            <a href="/works/1.html">
              <div class="nav-item">
                <img src="/assets/icon/workIcon.svg" alt="" />
              </div>
            </a>
            <a href="/logs/1.html">
              <div class="nav-item">
                <img src="/assets/icon/logIcon.svg" alt="" />
              </div>
            </a>
            <a href="/charts/1.html">
              <div class="nav-item">
                <img src="/assets/icon/chartIcon.svg" alt="" />
              </div>
            </a>
            <a href="/tools/1.html">
              <div class="nav-item">
                <img src="/assets/icon/toolIcon.svg" alt="" />
              </div>
            </a>
          </div>
          <div class="search">
            <div class="search-box">
              <div class="search-icon">
                <img src="/assets/icon/searchIcon.svg" alt="" />
              </div>
              <input
                class="search-input"
                type="text"
                placeholder="搜索"
                autocomplete="off"
              />
            </div>
            <ul class="search-result"></ul>
          </div>
        </div>
      </div>
      <div class="kcenter">
        <div class="kcenter-error">
          <div class="kcenter-error-404">404 - 在寂世庭的深处迷路了</div>
          <div class="kcenter-error-text">
            于此寂世庭，幽静深远，时有未可及之地。汝误入一隅，寻不得其踪，或此地已化虚无，杳然难觅。
          </div>
          <div class="kcenter-error-btn">归寻旧路</div>
        </div>
      </div>
      <div class="kright">
        <div class="kright-container"></div>
      </div>
      <div class="kcontrols">
        <div class="kcontrols-left">
          <img src="/assets/svg/right.svg.svg" alt="" />
        </div>
        <div class="kcontrols-right">
          <img src="/assets/icon/krightIcon.svg" alt="" />
        </div>
      </div>
    </div>
    <script src="/assets/js/index.js"></script>
    <script src="/assets/js/kleft.js"></script>
    <script>
      $(".kcenter-error-btn").addEventListener("click", function () {
        var referrer = document.referrer;
        var currentHostname = window.location.hostname;

        if (referrer && new URL(referrer).hostname === currentHostname) {
          window.location.href = referrer;
        } else {
          window.location.href = "/";
        }
      });
    </script>
  </body>
</html>
