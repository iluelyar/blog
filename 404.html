<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="keywords" content="html,css,js" />
    <meta name="author" content="K5938" />
    <!-- title -->
    <title>404 - 在寂世庭的深处迷路了</title>
    <!-- css -->
    <link rel="shortcut icon" href="/assets/png/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="stylesheet" href="/assets/css/left.css" />
    <link rel="stylesheet" href="/assets/css/center.css" />
    <link rel="stylesheet" href="/assets/css/right.css" />
    <style>
      .center {
        width: 100%;
        height: calc(100vh - 16px);
        display: flex;
        overflow: auto;
      }
      .center .center-error {
        width: 340px;
        margin: auto;
      }
      .center .center-error-404 {
        font-size: 2em;
        font-weight: bold;
      }
      .center .center-error-text {
        margin: 24px 0;
        font-size: 16px;
        font-weight: bold;
      }
      .center .center-error-btn {
        width: 140px;
        height: 40px;
        background-color: #fff5;
        border-radius: 8px;
        border: none;
        outline: none;
        line-height: 40px;
        text-align: center;
        color: whitefff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="blog">
      <div class="left">
        <div class="author">
          <div class="author-avatar"></div>
          <div class="author-name">K5938</div>
          <div class="author-desc">要么庸俗，要么孤独</div>
        </div>
        <div class="nav">
          <a href="/index.html">
            <div class="nav-item">
              <img src="/assets/svg/menu.svg" alt="" />
            </div>
          </a>
          <a href="/moments/index.html">
            <div class="nav-item">
              <img src="/assets/svg/moment.svg" alt="" />
            </div>
          </a>
          <a href="/notes/index.html">
            <div class="nav-item">
              <img src="/assets/svg/note.svg" alt="" />
            </div>
          </a>
          <a href="/visuals/index.html">
            <div class="nav-item">
              <img src="/assets/svg/visual.svg" alt="" />
            </div>
          </a>
          <a href="/devtools/index.html">
            <div class="nav-item">
              <img src="/assets/svg/tool.svg" alt="" />
            </div>
          </a>
          <a href="/projects/index.html">
            <div class="nav-item">
              <img src="/assets/svg/project.svg" alt="" />
            </div>
          </a>
        </div>
        <div class="search">
          <div class="search-box">
            <div class="search-icon">
              <img src="/assets/svg/search.svg" alt="" />
            </div>
            <input
              class="search-input"
              type="text"
              placeholder="搜索"
              autocomplete="off"
            />
          </div>
          <ul class="search-result"></ul>
        </div>
      </div>
      <div class="center">
        <div class="center-error">
          <div class="center-error-404">404 - 在寂世庭的深处迷路了</div>
          <div class="center-error-text">
            于此寂世庭，幽静深远，时有未可及之地。汝误入一隅，寻不得其踪，或此地已化虚无，杳然难觅。
          </div>
          <div class="center-error-btn">归寻旧路</div>
        </div>
      </div>
      <div class="right"></div>
      <div class="controls">
        <div class="controls-left">
          <img src="/assets/svg/slider.svg" alt="" />
        </div>
        <div class="controls-right">
          <img src="/assets/svg/bar.svg" alt="" />
        </div>
      </div>
    </div>
    <script src="/assets/js/index.js"></script>
    <script src="/assets/js/left.js"></script>
    <script>
      $(".center-error-btn").addEventListener("click", function () {
        var referrer = document.referrer;
        var currentHostname = window.location.hostname;

        if (referrer && new URL(referrer).hostname === currentHostname) {
          window.location.href = referrer;
        } else {
          window.location.href = "/index.html";
        }
      });
    </script>
  </body>
