<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="description" content="寂世庭" />
    <meta name="keywords" content="kui,kchart,kcard,ktool" />
    <meta name="author" content="西北第一深情" />
    <title>寂世庭</title>
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/index.css" />
    <link rel="stylesheet" href="/styles/slide.css" />
    <link rel="stylesheet" href="/styles/player.css" />
  </head>
  <body>
    <div class="blog">
      <div class="slide">
        <div class="author">
          <img class="cover" src="/assets/img/cover.png" alt="cover" />
          <img class="avatar" src="/assets/img/avatar.jpg" alt="avatar" />
          <div class="name">西北第一深情</div>
          <div class="desc">要么庸俗，要么孤独</div>
        </div>
        <div class="nav">
          <a href="">
            <div class="item">
              <img src="/assets/icon/menu.svg" />
            </div>
          </a>
          <a href="">
            <div class="item">
              <img src="/assets/icon/moment.svg" />
            </div>
          </a>
          <a href="">
            <div class="item">
              <img src="/assets/icon/note.svg" />
            </div>
          </a>
          <a href="">
            <div class="item">
              <img src="/assets/icon/visual.svg" />
            </div>
          </a>
          <a href="">
            <div class="item">
              <img src="/assets/icon/tool.svg" />
            </div>
          </a>
          <a href="">
            <div class="item">
              <img src="/assets/icon/project.svg" />
            </div>
          </a>
        </div>
        <div class="search">
          <div class="search-box">
            <div class="search-icon">
              <img src="/assets/icon/search.svg" alt="" />
            </div>
            <input class="search-input" placeholder="搜索" />
          </div>
          <div class="search-result"></div>
        </div>
      </div>
      <div class="main"></div>
      <div class="panel"></div>
    </div>
    <div class="blog">
      <div class="slide">
        <div class="kmp">
          <audio></audio>
          <div class="kmp-info">
            <div class="kmp-img"></div>
            <div class="kmp-name">Download...</div>
          </div>
          <div class="kmp-t">
            <div class="kmp-ct">00:00</div>
            <div class="kmp-tt">00:00</div>
          </div>
          <div class="kmp-prr">
            <div class="kmp-bar"></div>
          </div>
          <div class="kmp-ctr">
            <div class="kmp-loop">
              <img src="/assets/icon/ll.svg" alt="" />
            </div>
            <div class="kmp-prev">
              <img src="/assets/icon/prev.svg" alt="" />
            </div>
            <div class="kmp-toggle">
              <img src="/assets/icon/pause.svg" alt="" />
            </div>
            <div class="kmp-next">
              <img src="/assets/icon/next.svg" alt="" />
            </div>
          </div>
        </div>
      </div>
      <div class="main"></div>
      <div class="panel"></div>
    </div>
    <script src="/scripts/kdom.js"></script>
    <script src="/scripts/search.js"></script>
    <script src="/scripts/player.js"></script>
  </body>
</html>
