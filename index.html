<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="寂世庭" />
    <meta name="keywords" content="html,css,js" />
    <meta name="author" content="K5938" />
    <!-- favicon -->
    <link rel="shortcut icon" href="/assets/png/favicon.png" type="image/png" />
    <!-- title -->
    <title>寂世庭</title>
    <!-- css -->
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="stylesheet" href="/assets/css/center.css" />
    <link rel="stylesheet" href="/assets/css/right.css" />
  </head>
  <body>
    <div class="blog">
      <k-slide author-name="K5938" author-desc="要么庸俗，要么孤独"></k-slide>
      <div class="center">
        <div class="music">
          <audio id="audio"></audio>
          <div id="title"></div>
          <div id="progress">
            <div id="progressbar"></div>
          </div>
          <div id="ctime">00:00</div>
          <div id="ttime">00:00</div>
          <div id="loop">
            <img src="/assets/svg/listloop.svg" alt="" />
          </div>
          <div id="prev">
            <img src="/assets/svg/prev.svg" alt="" />
          </div>
          <div id="toggle">
            <img src="/assets/svg/pause.svg" alt="" />
          </div>
          <div id="next">
            <img src="/assets/svg/next.svg" alt="" />
          </div>
          <div id="list">
            <img src="/assets/svg/bar.svg" alt="" />
          </div>
        </div>
        <div class="note">空</div>
        <div class="visual">空</div>
        <div class="devtool">空</div>
        <div class="project">空</div>
      </div>
      <div class="right">
        <div class="moment"></div>
      </div>
      <div class="controls">
        <div class="controls-left">
          <img src="/assets/svg/slider.svg" alt="" />
        </div>
        <div class="controls-right">
          <img src="/assets/svg/bar.svg" alt="" />
        </div>
      </div>
    </div>
    <script src="/assets/js/index.js"></script>
    <script src="./component/KSlide.js"></script>
    <script src="/assets/js/music.js"></script>
    <script src="/assets/js/moment.js"></script>
  </body>
</html>
